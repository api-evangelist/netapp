naftiko: 1.0.0-alpha2
info:
  label: NetApp ONTAP REST API — SVMs
  description: 'NetApp ONTAP REST API — SVMs. 5 operations. Lead operation: Netapp List Storage Virtual Machines. Self-contained
    Naftiko capability covering one Netapp business surface.'
  tags:
  - Netapp
  - SVMs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NETAPP_API_KEY: NETAPP_API_KEY
capability:
  consumes:
  - type: http
    namespace: ontap-svms
    baseUri: https://{clusterMgmtIp}/api
    description: NetApp ONTAP REST API — SVMs business capability. Self-contained, no shared references.
    resources:
    - name: svm-svms
      path: /svm/svms
      operations:
      - name: listsvms
        method: GET
        description: Netapp List Storage Virtual Machines
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
          description: Filter by SVM name
        - name: state
          in: query
          type: string
          description: Filter by SVM state
      - name: createsvm
        method: POST
        description: Netapp Create a New Svm
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: svm-svms-uuid
      path: /svm/svms/{uuid}
      operations:
      - name: getsvm
        method: GET
        description: Netapp Retrieve a Specific Svm
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatesvm
        method: PATCH
        description: Netapp Update an Svm
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletesvm
        method: DELETE
        description: Netapp Delete an Svm
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.NETAPP_API_KEY}}'
  exposes:
  - type: rest
    namespace: ontap-svms-rest
    port: 8080
    description: REST adapter for NetApp ONTAP REST API — SVMs. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/svm/svms
      name: svm-svms
      description: REST surface for svm-svms.
      operations:
      - method: GET
        name: listsvms
        description: Netapp List Storage Virtual Machines
        call: ontap-svms.listsvms
        with:
          name: rest.name
          state: rest.state
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsvm
        description: Netapp Create a New Svm
        call: ontap-svms.createsvm
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/svm/svms/{uuid}
      name: svm-svms-uuid
      description: REST surface for svm-svms-uuid.
      operations:
      - method: GET
        name: getsvm
        description: Netapp Retrieve a Specific Svm
        call: ontap-svms.getsvm
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatesvm
        description: Netapp Update an Svm
        call: ontap-svms.updatesvm
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletesvm
        description: Netapp Delete an Svm
        call: ontap-svms.deletesvm
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ontap-svms-mcp
    port: 9090
    transport: http
    description: MCP adapter for NetApp ONTAP REST API — SVMs. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: netapp-list-storage-virtual-machines
      description: Netapp List Storage Virtual Machines
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ontap-svms.listsvms
      with:
        name: tools.name
        state: tools.state
      outputParameters:
      - type: object
        mapping: $.
    - name: netapp-create-new-svm
      description: Netapp Create a New Svm
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ontap-svms.createsvm
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: netapp-retrieve-specific-svm
      description: Netapp Retrieve a Specific Svm
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ontap-svms.getsvm
      outputParameters:
      - type: object
        mapping: $.
    - name: netapp-update-svm
      description: Netapp Update an Svm
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: ontap-svms.updatesvm
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: netapp-delete-svm
      description: Netapp Delete an Svm
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: ontap-svms.deletesvm
      outputParameters:
      - type: object
        mapping: $.
