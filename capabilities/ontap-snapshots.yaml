naftiko: 1.0.0-alpha2
info:
  label: NetApp ONTAP REST API — Snapshots
  description: 'NetApp ONTAP REST API — Snapshots. 2 operations. Lead operation: Netapp List Snapshots for a Volume. Self-contained
    Naftiko capability covering one Netapp business surface.'
  tags:
  - Netapp
  - Snapshots
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NETAPP_API_KEY: NETAPP_API_KEY
capability:
  consumes:
  - type: http
    namespace: ontap-snapshots
    baseUri: https://{clusterMgmtIp}/api
    description: NetApp ONTAP REST API — Snapshots business capability. Self-contained, no shared references.
    resources:
    - name: storage-volumes-volume.uuid-snapshots
      path: /storage/volumes/{volume.uuid}/snapshots
      operations:
      - name: listsnapshots
        method: GET
        description: Netapp List Snapshots for a Volume
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: volume.uuid
          in: path
          type: string
          description: UUID of the volume
          required: true
      - name: createsnapshot
        method: POST
        description: Netapp Create a Volume Snapshot
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: volume.uuid
          in: path
          type: string
          description: UUID of the volume
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.NETAPP_API_KEY}}'
  exposes:
  - type: rest
    namespace: ontap-snapshots-rest
    port: 8080
    description: REST adapter for NetApp ONTAP REST API — Snapshots. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/storage/volumes/{volume-uuid}/snapshots
      name: storage-volumes-volume-uuid-snapshots
      description: REST surface for storage-volumes-volume.uuid-snapshots.
      operations:
      - method: GET
        name: listsnapshots
        description: Netapp List Snapshots for a Volume
        call: ontap-snapshots.listsnapshots
        with:
          volume.uuid: rest.volume.uuid
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsnapshot
        description: Netapp Create a Volume Snapshot
        call: ontap-snapshots.createsnapshot
        with:
          volume.uuid: rest.volume.uuid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ontap-snapshots-mcp
    port: 9090
    transport: http
    description: MCP adapter for NetApp ONTAP REST API — Snapshots. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: netapp-list-snapshots-volume
      description: Netapp List Snapshots for a Volume
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ontap-snapshots.listsnapshots
      with:
        volume.uuid: tools.volume.uuid
      outputParameters:
      - type: object
        mapping: $.
    - name: netapp-create-volume-snapshot
      description: Netapp Create a Volume Snapshot
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ontap-snapshots.createsnapshot
      with:
        volume.uuid: tools.volume.uuid
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
