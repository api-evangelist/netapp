specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: NetApp
providerId: netapp
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Cloud
  - Storage
  - Data Management
notes: NetApp pricing is non-public; FinOps shape captured here is based on the documented product portfolio
  and typical cloud-marketplace billing patterns rather than published per-SKU rates. Reconcile against
  marketplace listings and the customer's NetApp Master License Agreement.
description: 'FOCUS-aligned FinOps for NetApp: hybrid storage and data services billed via cloud marketplaces
  (CVO, FSx for ONTAP, Azure NetApp Files), SaaS subscriptions (BlueXP, Cloud Insights), savings-share
  (Spot by NetApp), and direct enterprise hardware/software contracts.'
sources:
  - https://www.netapp.com/pricing/
  - https://docs.netapp.com/us-en/cloud-manager-automation/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: NetApp, Inc.
serviceCategory: Storage + Data Management
billingModel:
  pricingCategory: Pay-As-You-Go + Subscription + Enterprise Contract
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: NetApp
  ServiceCategory: Storage
  ServiceSubcategory: Cloud Data Management
  ProviderName: NetApp
  PublisherName: NetApp, Inc.
  InvoiceIssuerName: NetApp, Inc.
  BillingCurrency: USD
  PricingCategory: Pay-As-You-Go
meters:
  - name: cvo_capacity
    description: Cloud Volumes ONTAP licensed capacity (TB-month) or node-hours.
    unit: TB-month
    aggregation: avg
    dimensions:
      - cloud
      - region
      - tier
  - name: fsx_ontap_capacity
    description: AWS FSx for NetApp ONTAP capacity and IOPS.
    unit: GB-month
    aggregation: avg
    dimensions:
      - region
      - storage_class
  - name: anf_capacity
    description: Azure NetApp Files capacity by service level (Standard/Premium/Ultra).
    unit: TB-month
    aggregation: avg
    dimensions:
      - region
      - service_level
  - name: bluexp_subscription
    description: BlueXP service subscriptions (tiering, backup, replication, ransomware).
    unit: month
    aggregation: sum
    dimensions:
      - service
      - tenant
  - name: cloud_insights_subscription
    description: Cloud Insights tier subscription (Basic / Standard / Premium).
    unit: month
    aggregation: sum
    dimensions:
      - tier
      - tenant
  - name: spot_savings_share
    description: Percentage-of-savings billed by Spot by NetApp.
    unit: USD
    aggregation: sum
    dimensions:
      - product
      - account
  - name: enterprise_contract
    description: Hardware + ONTAP + support contracted purchases.
    unit: month
    aggregation: sum
    dimensions:
      - sku
      - region
principles:
  - name: Visibility
    description: Use BlueXP Digital Wallet for license inventory; Cloud Insights for telemetry; Spot
      Eco for commitment visibility; cloud-marketplace billing exports for CVO / FSx / ANF charges.
  - name: Allocation
    description: Tag NetApp resources at the cloud layer (AWS/Azure/GCP tags) so cost attribution flows
      through to FOCUS exports; use BlueXP Connector / project boundaries per business unit.
  - name: Optimization
    description: Use BlueXP tiering to move cold blocks to object storage; right-size ONTAP service levels
      (Standard vs Premium vs Ultra); use Spot Ocean to optimize Kubernetes compute; review BYOL vs marketplace
      tradeoffs per workload.
  - name: Accountability
    description: Assign per-workload license owners in BlueXP; review BlueXP Digital Wallet quarterly
      for unused capacity; reconcile cloud-marketplace bills against NetApp ELA commitments.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
