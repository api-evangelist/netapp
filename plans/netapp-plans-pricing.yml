specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: NetApp
providerId: netapp
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cloud
  - Data Management
  - Hybrid Cloud
  - Storage
notes: NetApp does not publish public per-SKU pricing for Cloud Volumes ONTAP, BlueXP, FSx for ONTAP,
  Azure NetApp Files, Cloud Volumes Service, or Cloud Insights. Pricing is delivered through cloud-marketplace
  listings (AWS, Azure, GCP), reseller quotes, or direct sales. Listed plans are placeholders representing
  product families; reconcile against marketplace listings or NetApp account team quotes.
description: NetApp's commercial pricing is not publicly listed per-SKU. The portfolio includes Cloud
  Volumes ONTAP, FSx for NetApp ONTAP (AWS), Azure NetApp Files, Google Cloud NetApp Volumes, BlueXP
  unified data management, Cloud Insights observability, and Spot by NetApp FinOps. Customers transact
  through cloud marketplaces or NetApp sales for licenses, capacity, and support tiers.
sources:
  - https://www.netapp.com/pricing/
  - https://bluexp.netapp.com/pricing
plans:
  - id: netapp-cloud-volumes-ontap
    name: Cloud Volumes ONTAP
    type: usage-based
    description: NetApp ONTAP delivered as software in AWS, Azure, GCP. Sold via cloud marketplaces with
      capacity-based or node-based licensing.
    entries:
      - label: Marketplace listing
        name: cvo_marketplace
        type: metered
        metric: varies
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see AWS/Azure/GCP marketplace listings
        userMultiplied: false
    elements:
      - name: Capacity-based or node-based licensing
      - name: BYOL or marketplace
      - name: Multiple availability zones
  - id: netapp-fsx-ontap
    name: FSx for NetApp ONTAP (AWS)
    type: usage-based
    description: AWS-managed NetApp ONTAP. Billed by AWS per GB and IOPS.
    entries:
      - label: AWS billing
        name: fsx_aws
        type: metered
        metric: gb_month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see AWS FSx for ONTAP pricing
        userMultiplied: false
    elements:
      - name: Multi-AZ deployments
      - name: Snapshots and SnapMirror
  - id: netapp-azure-netapp-files
    name: Azure NetApp Files
    type: usage-based
    description: Microsoft Azure-managed NetApp file service.
    entries:
      - label: Azure billing
        name: anf_azure
        type: metered
        metric: gb_month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see Azure NetApp Files pricing
        userMultiplied: false
    elements:
      - name: Standard / Premium / Ultra service levels
  - id: netapp-bluexp
    name: BlueXP
    type: subscription
    description: Unified hybrid-cloud data management plane.
    entries:
      - label: BlueXP subscription
        name: bluexp_subscription
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see BlueXP pricing
        userMultiplied: false
    elements:
      - name: Tiering
      - name: Backup
      - name: Replication
      - name: Ransomware protection
  - id: netapp-cloud-insights
    name: Cloud Insights
    type: subscription
    description: Hybrid-cloud infrastructure observability.
    entries:
      - label: Cloud Insights tiers
        name: cloud_insights
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see Cloud Insights pricing
        userMultiplied: false
    elements:
      - name: Basic / Standard / Premium tiers
      - name: Workload telemetry and security insights
  - id: netapp-spot
    name: Spot by NetApp
    type: usage-based
    description: Cloud cost optimization platform — Ocean (Kubernetes), Elastigroup (compute), Eco (commitments).
    entries:
      - label: Percentage of savings
        name: spot_savings_share
        type: metered
        metric: percent_of_savings
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see Spot pricing
        userMultiplied: false
    elements:
      - name: Ocean for Kubernetes
      - name: Elastigroup
      - name: Eco commitment management
  - id: netapp-enterprise
    name: NetApp Enterprise (Hardware + ONTAP)
    type: enterprise
    description: On-prem AFF / FAS / ASA arrays plus ONTAP licensing and support.
    entries:
      - label: Custom contract
        name: enterprise_contract
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Hardware purchase
      - name: ONTAP software
      - name: Premium support
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
