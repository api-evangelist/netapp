description: Machine-readable plans and pricing scaffold for this API provider. Conforms to the API Commons
  Plans schema. Tier limits and prices are scaffold defaults; replace with provider-published values.
plans:
  - id: netapp-free
    name: Free
    type: freemium
    description: Free entry tier for the NetApp API surface. Intended for evaluation, prototyping, and
      low-volume integrations. Real limits and pricing must be reconciled with the provider's published
      plan documentation.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://cloudmanager.cloud.netapp.com
          - https://<cluster-management-ip>/api
          - https://cloudvolumesgcp-api.netapp.com
          - https://astra.netapp.io/accounts
          - https://<storagegrid-endpoint>/api/v3
          - https://<mvip>/json-rpc
          - https://<tenant>.cloudinsights.netapp.com/rest/v1
          - https://<aiqum-host>/api
          - https://api.activeiq.netapp.com
          - https://<snapcenter-host>:8146/api
          - https://<web-services-proxy-host>/devmgr/v2
          - https://management.azure.com
          - https://<ontap-tools-host>:8443
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the free tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 10
        timeFrame: minute
        geo: global
        domains:
          - https://cloudmanager.cloud.netapp.com
          - https://<cluster-management-ip>/api
          - https://cloudvolumesgcp-api.netapp.com
          - https://astra.netapp.io/accounts
