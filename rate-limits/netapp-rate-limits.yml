specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: NetApp
providerId: netapp
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Cloud
  - Storage
  - Data Management
notes: NetApp does not publish per-second HTTP rate limits for BlueXP, Cloud Manager, ONTAP REST API,
  or Cloud Insights APIs. Throttling is implementation-specific by service and infrastructure. Reconcile
  against NetApp service-specific docs once published.
description: NetApp's various REST APIs (BlueXP / Cloud Manager, ONTAP REST API on Cloud Volumes ONTAP
  and FSx, Cloud Insights, Spot) do not publish concrete request-per-second limits in public documentation.
  Limits vary by service and are typically governed by underlying cloud-provider quotas (AWS, Azure,
  GCP) and per-account fair-use policies.
sources:
  - https://docs.netapp.com/us-en/cloud-manager-automation/
  - https://docs.netapp.com/us-en/cloudinsights/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: BlueXP / Cloud Manager API
    scope: account
    metric: varies
    limit: see BlueXP API documentation
    notes: Public docs do not specify RPS limits.
  - name: ONTAP REST API
    scope: cluster
    metric: varies
    limit: see ONTAP REST API documentation
    notes: Per-cluster; constrained by ONTAP node CPU and memory rather than published RPS.
  - name: Cloud Insights API
    scope: tenant
    metric: varies
    limit: see Cloud Insights API documentation
  - name: Spot by NetApp API
    scope: account
    metric: varies
    limit: see Spot API documentation
policies:
  - name: Service-specific quotas
    description: Each NetApp cloud service applies its own throttling. Use exponential backoff and honor
      Retry-After when present.
  - name: Cloud-provider quotas
    description: Cloud Volumes ONTAP, FSx, ANF, and Cloud Volumes are subject to AWS, Azure, and GCP
      provider-side API and capacity quotas.
  - name: Authentication tokens
    description: BlueXP / Cloud Manager uses refresh tokens; clients must re-authenticate periodically.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
